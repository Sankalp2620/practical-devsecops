---
- hosts: docker_nodes
  become: yes
  tasks:
    - name: Install dependencies
      dnf:
        name: "{{ item }}"
        state: present
      loop:
        - dnf-plugins-core
        - yum-utils

    - name: Add docker repo
      command: dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo

    - name: Install docker
      dnf:
        name: "{{ item  }}"
        state: present
      loop:
        - docker-ce
        - docker-ce-cli
        - containerd.io

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes
